server {
    listen 80;
    server_name _;
    include /etc/nginx/snippets/app.conf;
}

server {
    listen 443 ssl;
    http2 on;                            # nginx >= 1.25.1 directive (not `listen ... http2`)
    server_name _;

    ssl_certificate     /etc/nginx/certs/self.crt;
    ssl_certificate_key /etc/nginx/certs/self.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    include /etc/nginx/snippets/app.conf;
}
