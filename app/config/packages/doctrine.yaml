doctrine:
  dbal:
    dbname:   "%env(resolve:APP_DB)%"
    host:     "%env(resolve:APP_DB_HOST)%"
    port:     "%env(resolve:APP_DB_PORT)%"
    user:     "%env(resolve:APP_DB_USER)%"
    password: "%env(resolve:APP_DB_PASSWORD)%"
    driver: pdo_mysql
    server_version: '8.0.0'
    charset: utf8mb4
    logging: false
    profiling: false
    types:
      datetime_immutable_microsecond: App\Infrastructure\Doctrine\Type\DateTimeImmutableMicrosecondType
  orm:
    naming_strategy: doctrine.orm.naming_strategy.underscore_number_aware
    auto_mapping: true
    mappings:
      App:
        is_bundle: false
        type: attribute
        dir: '%kernel.project_dir%/src/Infrastructure/Doctrine/Entity/'
        prefix: 'App\Infrastructure\Doctrine\Entity'
        alias: App