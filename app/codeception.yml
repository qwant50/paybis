namespace: Tests
support_namespace: Support
paths:
  tests: tests
  output: tests/_output
  data: tests/Support/Data
  support: tests/Support
  envs: tests/_envs
actor_suffix: Tester
extensions:
  enabled:
    - Codeception\Extension\RunFailed
settings:
  # Per-suite bootstrap, resolved relative to each suite dir — `../bootstrap.php`
  # points both suites at tests/bootstrap.php (no .env files; configuration comes
  # from the real environment, with deterministic test-only overrides set there).
  bootstrap: ../bootstrap.php
  colors: true
  debug: true
  memory_limit: 1024M
coverage:
  enabled: true
  include:
    - src/*
  exclude:
    - src/Kernel.php
    - src/Infrastructure/Doctrine/Migrations/*
