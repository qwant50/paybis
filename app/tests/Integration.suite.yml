actor: IntegrationTester
modules:
  enabled:
    - Symfony:
        app_path: 'src'
        environment: 'test'
        debug: true
        cache_router: 'false'
        kernel_class: 'App\Kernel'
        rebootable_client: false
    - Doctrine:
        depends: Symfony
        cleanup: true
    - Asserts
    - Tests\Support\Helper\Integration
