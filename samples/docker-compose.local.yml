# Sample of docker-compose.override.yml for local environment
services:
  app:
    build:
      context: .
      args:
        - USER_ID=${UID:-1000}
        - GROUP_ID=${GID:-1000}
      dockerfile: ./docker/app/Dockerfile.local
    env_file:
      - .env
    healthcheck:
      # Healthy when both critical Supervisor programs (PHP-FPM and the
      # rate-fetch scheduler worker) report RUNNING.
      test: [ "CMD-SHELL", "supervisorctl status php-fpm scheduler-rates 2>&1 | grep -c RUNNING | grep -q '^2$'" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    volumes:
      - ./app/:/app/
      - /var/run/docker.sock:/var/run/docker.sock
      - ./logs:/var/log/
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: ./docker/web/Dockerfile
    container_name: paybis-web
    restart: always
    depends_on:
      - app
    volumes:
      - ./app/public:/app/public:ro
      - ./docker/web/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/web/app.conf:/etc/nginx/snippets/app.conf:ro
    ports:
      - "8090:80"
      - "8443:443"

  db:
    container_name: paybis-db
    env_file:
      - .env
    environment:
      # Root + application credentials are created on first container run.
      - MYSQL_ROOT_PASSWORD=admin
      - MYSQL_DATABASE=${APP_DB:-app}
      - MYSQL_USER=${APP_DB_USER:-app}
      - MYSQL_PASSWORD=${APP_DB_PASSWORD:-app}
    image: mysql:8.0
    restart: always
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-padmin"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - ./docker/db/init.sh:/docker-entrypoint-initdb.d/init.sh
      - db-data:/var/lib/mysql
      - ./docker/db/backup:/backup
    # Uncomment to access from host machine
    ports:
      - "3308:3306"

volumes:
  db-data: {}
